name: Update node-poweredup submodule

# Runs nightly to check whether the node-poweredup submodule has new commits.
# If it does, a PR is opened that bumps the submodule pointer. A comment on
# the PR lists every changed TypeScript file so Copilot can apply the
# port-ts-to-rust delta.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-submodule
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with submodules
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest submodule upstream
        run: |
          cd node-poweredup
          git fetch origin
          cd ..

      - name: Check for new commits
        id: check
        run: |
          cd node-poweredup
          CURRENT=$(git rev-parse HEAD)
          LATEST=$(git rev-parse origin/HEAD)
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect changed TypeScript files
        if: steps.check.outputs.changed == 'true'
        id: diff
        run: |
          cd node-poweredup
          CURRENT=${{ steps.check.outputs.current }}
          LATEST=${{ steps.check.outputs.latest }}
          FILES=$(git diff --name-only "$CURRENT" "$LATEST" -- '*.ts' | head -100)
          # Escape newlines for GitHub output multiline value
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # Short log of new commits
          LOG=$(git log --oneline "$CURRENT".."$LATEST" | head -20)
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Bump submodule pointer
        if: steps.check.outputs.changed == 'true'
        run: |
          cd node-poweredup
          git checkout ${{ steps.check.outputs.latest }}
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add node-poweredup
          git commit -m "chore: bump node-poweredup submodule to ${{ steps.check.outputs.latest }}"

      - name: Open pull request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/bump-node-poweredup
          base: main
          title: "chore: bump node-poweredup submodule"
          body: |
            ## Submodule update: `node-poweredup`

            New upstream commits:
            ```
            ${{ steps.diff.outputs.log }}
            ```

            ### Changed TypeScript files
            ```
            ${{ steps.diff.outputs.files }}
            ```

            ### Next steps
            Ask Copilot to apply the delta using the `port-ts-to-rust` skill:
            > For each changed TypeScript file listed above, use the port-ts-to-rust skill to update the Rust equivalent, then run `cargo test -p poweredup`.
          delete-branch: true
          labels: submodule-bump
